name: Upload Python Package

on:
  push:
  release:
    types: [published]

jobs:
  build_wheels:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Build wheels
      uses: pypa/cibuildwheel@v4.1.0
      env:
        CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-*
        CIBW_ARCHS_LINUX: x86_64
        CIBW_BEFORE_ALL_LINUX: |
          set -e
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y cmake java-11-openjdk-devel graphviz tree || true
            # Add Python development libs required by CMake FindPython3 Development/Embed
            dnf install -y python3-devel || true
            if ! dnf install -y nlohmann-json-devel; then
              dnf install -y nlohmann_json-devel || true
            fi
          elif command -v yum >/dev/null 2>&1; then
            yum install -y cmake java-11-openjdk-devel graphviz tree || true
            yum install -y python3-devel || true
            if ! yum install -y nlohmann-json-devel; then
              yum install -y nlohmann_json-devel || true
            fi
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y \
              cmake openjdk-11-jdk graphviz tree nlohmann-json3-dev \
              python3-dev
          else
            echo "No supported package manager found!" >&2
            exit 1
          fi
        CIBW_BEFORE_BUILD_LINUX: pip install --upgrade pip setuptools wheel cmake

    - uses: actions/upload-artifact@v7
      with:
        name: wheels
        path: ./wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Install system dependencies (Ubuntu)
      run: sudo apt-get install -y nlohmann-json3-dev tree graphviz openjdk-11-jdk cmake

    - name: Build sdist
      run: python -m build --sdist

    - uses: actions/upload-artifact@v7
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    if: github.event_name == 'release'
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: "*"
        path: dist/
        merge-multiple: true

    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
